messages:
  info_mcdm:
    text1: "DE: As defined by the IPCC (2022), vulnerability encompasses a variety of concepts and elements, including sensitivity and susceptibility to harm and lack of capacity to cope and adapt. The criteria presented in this MCDM provide an example of some external factors that could be considered when implementing an adaptation measure, however, do not encompass all vulnerabilities. The MCDM is thus a tool which can aid in decision-making, however, can never fully realize an entire socioeconomic system. Please take this into consideration when using the tool."