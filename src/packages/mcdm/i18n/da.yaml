messages:
  popUp:
    text1: 
      "Som defineret af IPCC (2022) omfatter sårbarhed en række begreber og elementer, 
      herunder følsomhed og modtagelighed over for skade samt manglende kapacitet til at 
      håndtere og tilpasse sig. De kriterier, der præsenteres i denne MCDM, giver et eksempel 
      på nogle eksterne faktorer, der kan overvejes ved implementering af et tilpasningstiltag, 
      men de dækker ikke alle former for sårbarhed. MCDM er således et værktøj, der kan 
      understøtte beslutningstagning, men kan aldrig fuldt ud repræsentere et helt socioøkonomisk system. 
      Dette bør tages i betragtning ved brug af værktøjet."
    sensitivityAnalysis:
      "Dette diagram viser rangeringen af tiltag på tværs af alle mulige kombinationer af kriterievægtninger; 
      det viser, hvor robust et tiltag er. For eksempel kan man sige, at “tiltag X” placerer sig 
      som nr. 1 i 50 % af tilfældene."
    rankingResult:
      "Dette diagram viser rangeringen af tiltag baseret på de indsendte kriterievægtninger. 
      Hvis for eksempel omkostning er vægtet som meget vigtig for dig, viser dette diagram, 
      hvilke tiltag der bedst matcher dette, hvor 1 er den bedst mulige rangering."
    
  modalStart:
    header: "CLIMADA Multikriterie-beslutningsanalyse (MCDM)"
    token: "Indtast venligst token for at få adgang til MCDM-dialogen."
    tokenEnter: "Indtast din token her og tryk på 'fortsæt'"
    continue: "Fortsæt"
  modalMain: 
    header: "Multikriterie-beslutningsanalyse (MCDM)"
    criteriaInfo: "Indsend venligst kriterievægte for at se diagrammet."
    calculate: "MCDM-analyse beregnes..."
    weight: "Vægt hvert kriterium og tryk på “Indsend” for at se resultater."
    back: "Tilbage"
    likertNot: "Ikke vigtigt "
    likertSomewhat: "Lidt vigtigt"
    likertHighly: "Meget vigtigt"
    submitCriteria: "Indsend kriterievægte"
    sensitivityAnalysisGraph: "Rangeringsresultat for tiltag: Følsomhedsanalyse"
    sensitivityMeasure: "Tiltag"
    sensitivityPercent: "Procent af samlede prøver"

  
  