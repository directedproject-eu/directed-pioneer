messages:
  popUp:
    text1: 
      "As defined by the IPCC (2022), vulnerability encompasses a variety of 
      concepts and elements, including sensitivity and susceptibility to harm and lack of 
      capacity to cope and adapt. The criteria presented in this MCDM provide an example of 
      some external factors that could be considered when implementing an adaptation measure, 
      however, do not encompass all vulnerabilities. The MCDM is thus a tool which can 
      aid in decision-making, however, can never fully realize an entire socioeconomic system. 
      Please take this into consideration when using the tool."
    sensitivityAnalysis:
      This chart shows the ranking of measures in all possible combinations of criteria weightings; 
      it shows how robust the measure is. For example, we could say 'measure X' falls into Rank 1 
      50% of the time.
    rankingResult:
      This chart shows the ranking of measures based on the criteria weightings which were submitted. 
      For example, if cost was weighted as highly important to you, this chart shows which measures 
      align best with this, with 1 being the best possible rank.
    
  modalStart:
    header: CLIMADA Multi-Criteria Decision Making (MCDM)
    token: Please enter a token to access the MCDM Dialog.
    tokenEnter: Enter your token here and press 'continue'
    continue: Continue
  modalMain: 
    header: Multi-Criteria Decision Making (MCDM)
    criteriaInfo: Please submit criteria weights to view the chart.
    calculate: Calculating MCDM analysis...
    weight: Please weight each criteria and press submit to view results.
    back: Back
    likertNot: Not Important
    likertSomewhat: Somewhat Important
    likertHighly: Highly Important
    submitCriteria: Submit Criteria Weights
    sensitivityAnalysisGraph: "Measure Ranking Result: Sensitivity Analysis"
    sensitivityMeasure: Measure
    sensitivityPercent: Percentage of Total Samples

  
  